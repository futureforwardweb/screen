<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candle Gradient</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #bg { position: fixed; inset: 0; background: #B8860B; transition: none; }
    #glow {
      position: fixed; inset: -20%;
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0;
      background: radial-gradient(ellipse at 50% 45%, rgba(255,180,60,0.9) 0%, rgba(255,120,0,0.5) 30%, transparent 70%);
    }
    #shadow {
      position: fixed; inset: 0;
      pointer-events: none;
      background: #000;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="shadow"></div>
  <div id="glow"></div>
  <script>
    const bg     = document.getElementById('bg');
    const glow   = document.getElementById('glow');
    const shadow = document.getElementById('shadow');

    const DURATION     = 7 * 60 * 1000;
    const RED_CUT_TIME = 1 * 60 * 1000;
    const start = performance.now();

    const startColor = { r: 184, g: 134, b: 11  };
    const endColor   = { r: 0,   g: 255, b: 136 };
    const redColor   = { r: 212, g: 18,  b: 18  };
    let redCut = false;

    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp(v) { return Math.max(0, Math.min(255, Math.round(v))); }
    function toHex(r, g, b) {
      return '#' + [r, g, b].map(v => clamp(v).toString(16).padStart(2, '0')).join('');
    }
    function easeInOutQuint(t) {
      return t < 0.5 ? 16 * t * t * t * t * t : 1 - Math.pow(-2 * t + 2, 5) / 2;
    }

    // Flicker layers
    let slowTarget = 0, slowCurrent = 0, slowTimer = 0, slowDuration = 0;
    let fastTarget = 0, fastCurrent = 0, fastTimer = 0, fastDuration = 0;
    // Dramatic surge layer — big brightness pulses
    let surgeTarget = 0, surgeCurrent = 0, surgeTimer = 0, surgeDuration = 0;

    function scheduleSlow() {
      slowTimer = 0;
      slowDuration = 200 + Math.random() * 500;
      slowTarget = Math.random() < 0.65 ? (Math.random() * 0.9 + 0.1) : (Math.random() * 0.05);
    }

    function scheduleFast() {
      fastTimer = 0;
      fastDuration = 30 + Math.random() * 100;
      fastTarget = Math.random() < 0.5 ? (Math.random() * 0.7 + 0.2) : 0;
    }

    function scheduleSurge() {
      surgeTimer = 0;
      // Big slow dramatic heaves
      surgeDuration = 600 + Math.random() * 1200;
      surgeTarget = Math.random() < 0.45 ? (Math.random() * 1.0 + 0.0) : 0;
    }

    scheduleSlow();
    scheduleFast();
    scheduleSurge();

    let lastNow = performance.now();

    function tick(now) {
      const elapsed = now - start;
      const dt = Math.min(now - lastNow, 100);
      lastNow = now;

      const rawT = Math.min(elapsed / DURATION, 1);
      const t = easeInOutQuint(rawT);

      let r, g, b;
      if (elapsed >= RED_CUT_TIME) {
        if (!redCut) redCut = true;
        r = redColor.r; g = redColor.g; b = redColor.b;
      } else {
        r = lerp(startColor.r, endColor.r, t);
        g = lerp(startColor.g, endColor.g, t);
        b = lerp(startColor.b, endColor.b, t);
      }

      // Slow sway
      slowTimer += dt;
      if (slowTimer >= slowDuration) scheduleSlow();
      slowCurrent += (slowTarget - slowCurrent) * 0.05;

      // Fast sputter
      fastTimer += dt;
      if (fastTimer >= fastDuration) scheduleFast();
      const fastP = Math.min(fastTimer / fastDuration, 1);
      fastCurrent += (fastTarget - fastCurrent) * 0.22;
      const fastEased = Math.sin(fastP * Math.PI);

      // Surge
      surgeTimer += dt;
      if (surgeTimer >= surgeDuration) scheduleSurge();
      surgeCurrent += (surgeTarget - surgeCurrent) * 0.025;

      // Combine all layers
      const flickerVal = Math.min(
        slowCurrent * 0.4 + fastCurrent * fastEased * 0.3 + surgeCurrent * 0.3,
        1.0
      );

      // Strong dim: up to 55% darkness drop
      const dim = 1 - flickerVal * 0.55;

      // Shadow overlay for extra darkness punch
      const shadowOpacity = flickerVal * 0.45;

      // Glow brightens on high flicker
      const glowOpacity = flickerVal * 0.85;

      bg.style.background = toHex(r * dim, g * dim, b * dim);
      shadow.style.opacity = shadowOpacity.toFixed(3);
      glow.style.opacity = glowOpacity.toFixed(3);

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
